name: Deploy Bharat Bhakti Sangam to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /var/www/bharat_bhakti_sangam

            echo "Loading environment..."
            source ~/.bashrc || true

            echo "Ensure pnpm exists..."
            command -v pnpm >/dev/null 2>&1 || npm install -g pnpm

            echo "Pull latest code..."
            git fetch --all
            git reset --hard origin/main

            echo "Install deps..."
            pnpm install --frozen-lockfile

            echo "Build app..."
            rm -rf .next
            pnpm build

            echo "Deploy with PM2..."
            if pm2 describe bbs-app > /dev/null; then
              pm2 reload bbs-app --update-env
            else
              pm2 start pnpm --name "bbs-app" -- start
            fi

            echo "Save PM2..."
            pm2 save
